n"], "a": 1, "e": "BABOK: A business case must justify the investment by showing the value delivered exceeds the cost and risk of change. It should articulate the problem/opportunity, potential solutions, cost-benefit analysis, and risks. Technical architecture and detailed requirements come later."}, {"d": 7, "q": "An organisation is evaluating three options to solve a business problem: build internally, buy a commercial system, or outsource. What type of analysis should the BA conduct?", "o": ["Risk analysis only \u2014 since the primary concern is minimising risk", "Alternative solution analysis \u2014 evaluating each option against defined criteria including cost, fit, risk, and timeline", "Feasibility study \u2014 focusing solely on technical feasibility", "Stakeholder analysis \u2014 since different stakeholders prefer different options"], "a": 1, "e": "BABOK: When multiple solution options exist, the BA conducts alternative solution analysis \u2014 systematically evaluating each option against agreed-upon criteria. This produces an objective comparison that enables informed decision-making by the governance authority."}, {"d": 7, "q": "A BA defines the future state as 'citizens can submit and track service requests online within 3 minutes.' What makes this an effective future state definition?", "o": ["It is vague enough to allow flexibility in solution design", "It is specific and measurable \u2014 providing a clear, testable target for the change", "It describes the technology solution rather than the business outcome", "It is ambitious enough to motivate the project team"], "a": 1, "e": "BABOK: Effective future state definitions are specific and measurable \u2014 they define what success looks like in terms that can be verified. 'Submit and track within 3 minutes' gives a testable criterion. Vague future states lead to solutions that cannot be evaluated for success."}, {"d": 7, "q": "A BA is performing SWOT analysis as part of strategy analysis. A government mandate requiring all public services to be digitised by 2026 would most likely appear under which SWOT element?", "o": ["Strength \u2014 the organisation has a capability that others lack", "Weakness \u2014 the organisation has an internal gap to address", "Opportunity \u2014 an external factor that the organisation can leverage", "Threat \u2014 an external factor that creates risk if not addressed"], "a": 2, "e": "BABOK: SWOT classifies external positive factors as Opportunities and external negative factors as Threats. A government mandate for digitisation is an external factor the organisation can leverage \u2014 it creates a driver and potential funding for digital transformation work."}, {"d": 7, "q": "A BA discovers during strategy analysis that two proposed solutions would both address the identified need but have very different risk profiles. What should the BA do?", "o": ["Recommend the solution with the lowest risk regardless of other factors", "Present both options with transparent risk, cost, and value analysis to enable informed decision-making", "Select the solution internally and present only the recommended option", "Ask the project manager to make the decision without BA analysis"], "a": 1, "e": "BABOK: The BA's role in solution evaluation is to provide objective analysis \u2014 not to make decisions for leadership. Presenting both options with transparent comparison of risk, cost, value, and fit enables governance authorities to make informed decisions with full information."}, {"d": 7, "q": "A BA is asked to define the scope of a change initiative. Which output best defines scope?", "o": ["A high-level project plan showing timeline and resources", "A scope model or context diagram showing what is in scope, what is out of scope, and how the solution interacts with external entities", "A list of all stakeholders who will be affected by the change", "A functional requirements document with all requirements marked as in-scope"], "a": 1, "e": "BABOK: A scope model or context diagram explicitly defines the boundary of the solution \u2014 what it includes, what it excludes, and how it interfaces with external systems and stakeholders. This creates shared understanding of scope boundaries before requirements are developed."}, {"d": 7, "q": "A BA is conducting strategy analysis when a sponsor says 'We already know what the solution is, so let's skip strategy analysis.' What is the risk of this approach?", "o": ["No significant risk if the sponsor is experienced and confident", "The organisation may implement a solution that addresses the wrong problem or misses higher-value opportunities", "Strategy analysis is optional for small projects so the risk depends on project size", "The BA will have fewer artefacts to produce, which may impact BA quality metrics"], "a": 1, "e": "BABOK: Skipping strategy analysis means jumping to solution without validating the need. The sponsor's assumed solution may address symptoms rather than root causes, may miss higher-value alternatives, or may be based on outdated understanding of the problem. This is a significant risk."}, {"d": 7, "q": "A BA defines assumptions and constraints at the start of strategy analysis. A key assumption is that a specific regulatory approval will be granted by Q2. What should the BA flag?", "o": ["That the assumption should be kept confidential to avoid alarming stakeholders", "That the assumption introduces risk \u2014 if the regulatory approval is delayed, the project timeline and solution may be impacted", "That assumptions are always correct and do not require risk management", "That the assumption should be immediately escalated as a project blocker"], "a": 1, "e": "BABOK: Assumptions are unverified beliefs. When assumptions are critical (like regulatory approvals), they introduce risk \u2014 if the assumption is wrong, the project is affected. The BA must flag this, suggest validation steps, and note the risk in case the assumption does not hold."}, {"d": 7, "q": "A BA is completing strategy analysis for a healthcare digital transformation. The analysis reveals that two government ministries have overlapping and conflicting processes. What does this represent?", "o": ["A future state capability that must be designed into the solution", "A current state problem that must be addressed as part of the gap analysis and solution scope", "A stakeholder conflict that is outside BA scope", "A risk that should be documented but not acted upon"], "a": 1, "e": "BABOK: Overlapping and conflicting processes between departments are a current state finding \u2014 they represent a real organisational problem that the change initiative must address. If not included in scope, the solution will perpetuate the conflict into the future state."}, {"d": 7, "q": "A BA is recommending a solution to address a business need. The governance committee asks 'Why this solution and not others?' What should the BA's response include?", "o": ["A confirmation that this solution is the stakeholder's preference", "A structured comparison of evaluated alternatives showing why the recommended solution best satisfies the defined need, criteria, and constraints", "A technical specification proving the solution is implementable", "A project management plan showing how the solution will be delivered"], "a": 1, "e": "BABOK: Solution recommendations must be justified through comparative analysis. The BA should show the criteria used, how each alternative was assessed, and why the recommended option best satisfies the need relative to other options. This makes the recommendation defensible and transparent."}, {"d": 7, "q": "An organisation is experiencing declining citizen satisfaction with a service. A BA is conducting strategy analysis. Which action should occur first?", "o": ["Define the future state \u2014 what excellent citizen satisfaction would look like", "Analyse root causes of the current satisfaction decline before defining any future state", "Identify vendors who can provide technology solutions for citizen service improvement", "Begin stakeholder analysis to identify all affected parties"], "a": 1, "e": "BABOK: Understanding the root cause of the current problem must precede future state definition. Defining a future state without understanding why satisfaction is declining risks designing solutions that do not address the actual problem. Root cause analysis precedes future state definition."}, {"d": 7, "q": "A BA is asked to assess the feasibility of a proposed solution. Which dimensions of feasibility should the BA evaluate?", "o": ["Technical feasibility only \u2014 whether the technology can be built", "Technical, operational, financial, legal/regulatory, and schedule feasibility \u2014 all are relevant", "Financial feasibility only \u2014 whether the budget is sufficient", "Legal feasibility only \u2014 to ensure regulatory compliance"], "a": 1, "e": "BABOK: Comprehensive feasibility assessment covers multiple dimensions \u2014 technical (can it be built?), operational (can it be operated?), financial (is it affordable?), legal/regulatory (is it compliant?), and schedule (can it be delivered in time?). Single-dimension feasibility analysis is incomplete."}, {"d": 7, "q": "A BA is working on strategy analysis when a stakeholder suggests expanding the project scope significantly. How should the BA respond?", "o": ["Accept the expansion to be responsive to stakeholder needs", "Analyse the business case for the expansion \u2014 assessing additional value, cost, risk, and whether it belongs in this initiative or a separate one", "Reject the expansion as it was not in the original charter", "Escalate the request to the project manager to handle scope"], "a": 1, "e": "BABOK: Scope expansion requires analysis \u2014 the BA should assess whether the expanded scope delivers proportional additional value, fits the initiative's objectives, can be resourced, and whether it should be in this project or a separate initiative. Analysis precedes any recommendation."}, {"d": 8, "q": "A BA must document the approval hierarchy for a government financial system: transactions under \u20b910,000 go to Level 1 approval, \u20b910,000\u2013\u20b9100,000 go to Level 2, and above \u20b9100,000 go to Director. Which technique best captures this?", "o": ["A use case diagram showing all system actors", "A decision table or business rule definition mapping conditions to approval levels", "A swim lane process flow showing all actors", "A data flow diagram showing transaction data movement"], "a": 1, "e": "BABOK: Complex conditional business rules with multiple thresholds are most clearly captured in decision tables \u2014 they systematically map all combinations of conditions to outcomes. Decision tables prevent gaps and contradictions in complex rule sets."}, {"d": 8, "q": "A BA creates a process flow that shows 'who does what' at each step of a service delivery process. What type of model is this?", "o": ["An entity-relationship diagram showing data relationships", "A swim lane diagram showing tasks by actor and their sequence", "A use case diagram showing system-user interactions", "A context diagram showing system boundary and external entities"], "a": 1, "e": "BABOK: Swim lane diagrams (cross-functional flowcharts) show process steps (what), sequence (when), and responsibility (who) in horizontal or vertical lanes by actor. They make handoffs between roles or departments explicit \u2014 ideal for multi-party processes."}, {"d": 8, "q": "A BA is specifying that the system must support concurrent use by 1,000 users with response times under 2 seconds. Which type of requirement is this?", "o": ["Functional requirement \u2014 it describes system behaviour", "Business rule \u2014 it governs how the system operates", "Non-functional requirement \u2014 it describes a quality attribute (performance)", "Transition requirement \u2014 it applies during the go-live period only"], "a": 2, "e": "BABOK: Non-functional requirements describe quality attributes \u2014 performance, security, reliability, scalability, usability \u2014 rather than specific functions or behaviours. Concurrent user count and response time are performance requirements \u2014 measurable quality attributes."}, {"d": 8, "q": "A BA is reviewing user stories in the product backlog. One story reads: 'As a user, I want the system to be fast.' What is the primary problem with this user story?", "o": ["It is written from the wrong user perspective", "'Fast' is not measurable or testable \u2014 acceptance criteria must define specific performance thresholds", "It is a technical requirement that should not be in the product backlog", "It is a business rule rather than a user story"], "a": 1, "e": "BABOK: User stories must have testable acceptance criteria. 'Fast' is subjective and untestable. The story must be refined to include specific, measurable acceptance criteria: 'The search results page loads within 1.5 seconds for 95% of queries under normal load.'"}, {"d": 8, "q": "A BA needs to show stakeholders how a proposed online claims portal will look and function before development begins. Which technique achieves this most effectively?", "o": ["A process flow diagram showing the claim submission steps", "A wireframe or prototype showing the portal layout and navigation flow", "A data dictionary defining all data elements the portal will capture", "A use case diagram showing all portal actors and interactions"], "a": 1, "e": "BABOK: Wireframes and prototypes make abstract requirements tangible \u2014 allowing stakeholders to react to what they will see, navigate, and interact with before any code is written. They are particularly effective for eliciting UI/UX requirements and confirming design direction."}, {"d": 8, "q": "A BA is defining requirements for a data integration between two government systems. The systems must exchange citizen records. Which artefact is most important for this integration?", "o": ["A process flow diagram showing when the integration is triggered", "A data dictionary specifying all data elements, formats, validation rules, and mapping between the two systems", "A stakeholder map showing which departments own each system", "A use case diagram showing the integration actor and system interactions"], "a": 1, "e": "BABOK: System integrations require precise data specifications \u2014 a data dictionary defining each element's name, type, format, length, valid values, mandatory/optional status, and mapping between systems. Without this, developers cannot build a functioning integration."}, {"d": 8, "q": "A BA is modelling a system and needs to show how a citizen's service request moves through multiple status changes (submitted, reviewed, approved, rejected, appealed, closed). Which technique is most appropriate?", "o": ["A swim lane diagram showing actors at each stage", "A state diagram showing all possible states and the events that trigger transitions", "An entity-relationship diagram showing the service request data structure", "A use case diagram showing citizen interactions with the system"], "a": 1, "e": "BABOK: State diagrams (state machines) model all possible states an entity can exist in and the events or conditions that trigger transitions between states. They are ideal for complex objects with multiple valid states \u2014 like a service request lifecycle."}, {"d": 8, "q": "A BA has documented a set of functional requirements. A developer asks 'What should happen if the user submits the form with missing mandatory fields?' The BA cannot answer. What requirement is missing?", "o": ["A business rule governing mandatory field definitions", "Exception flow or alternative path requirements \u2014 the requirement only covers the happy path", "A non-functional requirement for form validation response time", "A stakeholder requirement from the user experience team"], "a": 1, "e": "BABOK: Complete requirements specify both the main (happy path) flow AND alternative/exception flows. 'What happens when something goes wrong?' must be explicitly specified. Missing exception flows lead to undefined system behaviour and development assumptions that may not match business intent."}, {"d": 8, "q": "A BA is designing the acceptance criteria for a user story about a medical claim submission. Which acceptance criterion is best?", "o": ["The submission process should be straightforward and easy for users", "The system accepts submission only when all mandatory fields are complete \u2014 validating field format and displaying specific error messages for each missing or invalid field", "The system should handle claim submissions efficiently", "Users should be able to submit claims without assistance"], "a": 1, "e": "BABOK: Acceptance criteria must be specific and testable. The second option defines exactly what the system does (accepts only with complete fields), how (validating format), and what it communicates (specific error messages for each issue). This is testable and unambiguous."}, {"d": 8, "q": "A BA needs to specify the relationship between Employees, Departments, and Leave Requests in a government HR system. Which modelling technique is most appropriate?", "o": ["A process flow diagram showing the leave request approval steps", "An entity-relationship diagram showing entities, attributes, and their relationships", "A context diagram showing the HR system boundary and external systems", "A swim lane diagram showing HR approval roles and responsibilities"], "a": 1, "e": "BABOK: Entity-relationship diagrams (ERDs) model data structures \u2014 what entities exist (Employee, Department, Leave Request), their attributes (EmployeeID, Name), and relationships (one employee can have many leave requests; one department has many employees). This drives data design."}, {"d": 8, "q": "A BA is defining the solution scope. A stakeholder requests that employee performance management be included in a system tha tionship diagram showing role entities and their relationships"], "a": 1, "e": "BABOK: A roles and permissions matrix (RACI variant for system access) maps each role to system functions/features with access levels (read, write, approve, none). It provides a complete, testable specification of security requirements in a clear tabular format."}, {"d": 8, "q": "A BA receives two requirements that conflict: one says 'The system shall automatically escalate claims after 3 business days' and another says 'Escalation shall only occur after manager review.' What must the BA do?", "o": ["Implement the first requirement as it was submitted earlier", "Surface the conflict with stakeholders, understand the underlying intent, and obtain a decision that resolves the contradiction", "Implement both and let the development team resolve the technical conflict", "Document both requirements with a note about the conflict and proceed"], "a": 1, "e": "BABOK: Requirements conflicts must be resolved before handoff to development. The BA must surface the contradiction, facilitate stakeholder discussion to understand the underlying intent of each requirement, and obtain an authorised decision that produces one consistent requirement."}, {"d": 8, "q": "A BA is modelling a complex government approval process that involves different decisions at each stage. Which technique is most effective for capturing all possible decision paths?", "o": ["A swim lane diagram showing actors at each stage of the process", "A decision tree or decision table mapping conditions at each stage to resulting actions", "A state diagram showing all states the approval can enter", "A use case diagram showing all approval actors and system interactions"], "a": 1, "e": "BABOK: Decision trees or decision tables are designed for complex conditional logic \u2014 they systematically capture all possible combinations of conditions and resulting actions. They prevent gaps in logic and make all decision paths visible for review stem incorrectly"], "a": 1, "e": "BABOK: Low adoption despite functional correctness indicates requirements for the human side of change were missed \u2014 usability requirements, transition requirements (training, support, change communication), or stakeholder engagement. Technically correct solutions fail without effective adoption planning."}, {"d": 9, "q": "A BA finds that a system delivers 80% of the expected business value but consistently fails in one area. What is the recommended approach?", "o": ["Accept 80% as a successful outcome and close the evaluation", "Analyse the root cause of the 20% gap and assess whether targeted improvements can close it without replacement", "Replace the entire system to achieve full value delivery", "Report success and attribute the gap to factors outside the solution's control"], "a": 1, "e": "BABOK: A performance gap requires root cause analysis before any recommendation. The BA should identify WHY the 20% gap exists \u2014 whether it is addressable through enhancements, process changes, or additional training \u2014 before recommending replacement or acceptance."}, {"d": 9, "q": "A BA is evaluating whether to recommend that a legacy system be enhanced, replaced, or retired. Which analysis should the BA conduct?", "o": ["A user satisfaction survey to determine if users prefer the current system", "Total cost of ownership combined with value delivery assessment and alignment with future business needs", "A technical feasibility assessment conducted by the development team only", "A stakeholder vote to determine preferred option"], "a": 1, "e": "BABOK: The enhance/replace/retire decision requires assessing: how much value the current solution delivers, the cost to maintain vs replace, whether the solution aligns with future business direction, and what limitations exist. TCO + value + strategic alignment provides the framework."}, {"d": 9, "q": "Users complain that a deployed HR system is difficult to use even though it passes ion. Solution B meets 100% of requirements but has 30% user adoption. Which is performing better as a solution?", "o": ["Solution B \u2014 it meets more requirements and requirements are the standard for success", "Solution A \u2014 high adoption indicates it is delivering actual business value; Solution B's low adoption means value is not being realised despite completeness", "They are equal \u2014 both have strengths and weaknesses that cancel each other out", "Neither \u2014 both should be replaced with a solution that meets 100% of requirements AND achieves high adoption"], "a": 1, "e": "BABOK: A solution only delivers value when it is used. Solution A with 90% of requirements and high adoption is realising business value. Solution B with 100% requirements but 30% adoption is technically complete but failing to deliver value \u2014 the requirements are irrelevant if users cannot or will not use the system."}, {"d": 9, "q": "A BA is defining how solution performance will be measured before deployment. What is the most important preparation step?", "o": ["Creating a detailed requirements traceability matrix for all implemented features", "Capturing baseline performance data before go-live so post-implementation comparison is possible", "Preparing a user training plan to maximise adoption from day one", "Scheduling a post-implementation review 12 months after go-live"], "a": 1, "e": "BABOK: Pre-go-live baseline capture is the most critical preparation step for evaluation. Without baseline data on current performance, it is impossible to demonstrate improvement. The BA must identify what will be measured and capture pre-implementation data before the solution goes live."}, {"d": 9, "q": "A BA conducts a solution evaluation and finds that the solution is delivering value but a specific user group is experiencing unnecessary friction. What is the appropriate recommendation?", "o": ["Replace the entire solution since some users are experiencing friction", "Assess whether targeted improvements for the affected user group can reduce friction without disrupting overall value delivery", "Accept the friction as an unavoidable trade-off for overall success", "Transfer the affected users to a different system that better suits their needs"], "a": 1, "e": "BABOK: Solution evaluation is not binary. When most of a solution is working but specific elements need improvement, targeted enhancement is usually more appropriate than wholesale replacement. The BA should scope the specific issue, assess improvement options, and recommend the proportionate response."}];

// ── REAL EXAM: 50Q, 75 min, random from pool ─────────────────────────────────
const NUM_REAL_SETS = 15;

// ── STATE ────────────────────────────────────────────────────────────────────
let S = {
  screen: 'home',   // home | exam | results
  tab: 'domain',    // domain | real
  mode: 'domain',   // domain | real
  domainId: 0,      // for domain mode: 1-9
  realSet: 0,       // for real mode: 1-15
  questions: [],    // current test questions
  qi: 0,
  ans: [],
  submitted: false,
  sec: 0,
  interval: null,
  start: null,
  scores: {},       // key -> {score, total, p}
};

function scoreKey() {
  if (S.mode === 'domain') return 'd' + S.domainId;
  return 'r' + S.realSet;
}

// ── RANDOM SHUFFLE ───────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getQuestionsForDomain(did) {
  return shuffle(POOL.filter(q => q.d === did)).slice(0, 50);
}

function getQuestionsForRealSet(setNum) {
  // Seed-like: use setNum to create reproducible but varied sets
  // Each set: ~5-6 questions per domain, randomised
  const result = [];
  DOMAINS.forEach(d => {
    const dq = shuffle(POOL.filter(q => q.d === d.id));
    // 50 / 9 domains ≈ 5-6 per domain
    result.push(...dq.slice(0, 6));
  });
  // Trim to exactly 50, shuffle the combined set
  return shuffle(result).slice(0, 50);
}

// ── RENDER EXAM ──────────────────────────────────────────────────────────────
function renderExam() {
  const total = S.questions.length;
  const q = S.questions[S.qi];
  const answered = S.ans.filter(a => a !== null && a !== undefined).length;
  const allDone = answered === total;
  const m = String(Math.floor(S.sec / 60)).padStart(2, '0');
  const s2 = String(S.sec % 60).padStart(2, '0');
  const warn = S.sec < 300;
  const L = ['A','B','C','D'];
  const domName = DOMAINS.find(d => d.id === q.d)?.name || '';

  const opts = q.o.map((o, i) => {
    let cls = 'opt';
    if (S.submitted) {
      if (i === q.a) cls += ' correct';
      else if (S.ans[S.qi] === i) cls += ' wrong';
    } else if (S.ans[S.qi] === i) cls += ' sel';
    return `<div class="${cls}" onclick="pick(${i})">
      <div class="oletter">${L[i]}</div><div>${o}</div>
    </div>`;
  }).join('');

  let expHtml = '';
  if (S.submitted) {
    const ok = S.ans[S.qi] === q.a;
    expHtml = `<div class="expbox ${ok ? '' : 'bad'}" style="display:block">
      <div class="exptitle">${ok ? '✅ Correct — ' : '❌ Incorrect — '}BABOK v3 Explanation</div>
      ${q.e}
    </div>`;
  }

  const dots = S.questions.map((_, i) => {
    let cls = 'dot';
    if (i === S.qi) cls += ' cur';
    else if (S.submitted) cls += S.ans[i] === S.questions[i].a ? ' ok' : ' bad';
    else if (S.ans[i] !== null && S.ans[i] !== undefined) cls += ' ans';
    return `<div class="${cls}" onclick="gotoQ(${i})">${i+1}</div>`;
  }).join('');

  const titleLabel = S.mode === 'domain'
    ? (DOMAINS.find(d => d.id === S.domainId)?.name || '')
    : `Real Exam Simulation #${S.realSet}`;

  const hasSelected = S.ans[S.qi] !== null && S.ans[S.qi] !== undefined;

  return `<div class="exam">
    <div class="ehdr">
      <div>
        <div class="etitle">${titleLabel}</div>
        <div class="emeta">${S.mode === 'domain' ? 'Domain Practice' : 'Mixed · All 9 Domains'}</div>
        <div class="pbar"><div class="pfill" style="width:${(answered/total)*100}%"></div></div>
      </div>
      <div style="text-align:right">
        <div class="timer ${warn ? 'warn' : ''}" id="timerEl">${m}:${s2}</div>
        <div class="emeta" style="margin-top:3px">${answered}/${total} answered</div>
      </div>
    </div>

    <div class="qcard">
      <div class="qnum">QUESTION ${S.qi + 1} OF ${total}</div>
      <div class="qdom">${domName}</div>
      <div class="qtext">${q.q}</div>
      <div class="opts">${opts}</div>
      ${expHtml}
    </div>

    <div class="navpanel">
      <div class="navlbl">Navigator — click to jump to any question</div>
      <div class="dots">${dots}</div>
    </div>

    <div class="navrow">
      <button class="nbtn pbtn" onclick="prevQ()" ${S.qi === 0 ? 'disabled' : ''}>← Prev</button>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${!S.submitted
          ? `<button class="nbtn chkbtn" onclick="checkQ()" ${hasSelected ? '' : 'disabled'}>Check Answer</button>`
          : ''}
        ${allDone && !S.submitted
          ? `<button class="nbtn submbtn" onclick="submitTest()">Submit All →</button>`
          : ''}
        ${S.submitted
          ? `<button class="nbtn submbtn" onclick="showResults()">View Results →</button>`
          : ''}
      </div>
      <button class="nbtn nxtbtn" onclick="nextQ()" ${S.qi === total - 1 ? 'disabled' : ''}>Next →</button>
    </div>
  </div>`;
}

// ── RENDER RESULTS ───────────────────────────────────────────────────────────
function renderResults() {
  const qs = S.questions;
  const total = qs.length;
  let correct = 0;
  const dmap = {};
  qs.forEach((q, i) => {
    const ok = S.ans[i] === q.a;
    if (ok) correct++;
    const key = q.d;
    if (!dmap[key]) dmap[key] = { c: 0, t: 0, name: DOMAINS.find(d => d.id === key)?.name || '' };
    dmap[key].t++;
    if (ok) dmap[key].c++;
  });
  const pct = Math.round((correct / total) * 100);
  const pass = pct >= 75;
  const elapsed = Math.round((Date.now() - S.start) / 1000);
  const em = Math.floor(elapsed / 60), es = elapsed % 60;

  const dBars = Object.entries(dmap).map(([did, d]) => {
    const dp = Math.round((d.c / d.t) * 100);
    const bc = dp >= 75 ? '#166534' : dp >= 50 ? '#92400e' : '#991b1b';
    return `<div class="drow">
      <div class="dname">${d.name}</div>
      <div class="dbarbg"><div class="dbar" style="width:${dp}%;background:${bc}"></div></div>
      <div class="dpct">${dp}%</div>
    </div>`;
  }).join('');

  const rev = qs.map((q, i) => {
    const ok = S.ans[i] === q.a;
    return `<div class="ritem ${ok ? 'ok' : 'bad'}">
      <div class="riq">Q${i+1}: ${q.q}</div>
      <div class="ria">Your answer: ${q.o[S.ans[i]] ?? 'Not answered'}</div>
      ${!ok ? `<div class="ric">✓ Correct: ${q.o[q.a]}</div><div class="riexp">${q.e}</div>` : ''}
    </div>`;
  }).join('');

  return `<div class="results">
    <div class="rhero ${pass ? 'pass' : 'fail'}">
      <div class="rscore">${pct}%</div>
      <div class="rlabel">${pass ? '🎉 PASSED — Above 75% Pass Mark!' : '📚 Below Pass Mark — Review & Retry'}</div>
      <div class="rmeta">${correct}/${total} correct · Time: ${em}m ${es}s</div>
      <div class="rmeta" style="margin-top:4px">Note: Real IIBA exam shows performance indicators, not exact %. This % is for your self-assessment.</div>
    </div>
    <div class="sgrid">
      <div class="sbox"><div class="snum">${correct}</div><div class="slbl">Correct</div></div>
      <div class="sbox"><div class="snum">${total - correct}</div><div class="slbl">Wrong</div></div>
      <div class="sbox"><div class="snum">${pct}%</div><div class="slbl">Score</div></div>
      <div class="sbox"><div class="snum">${em}m</div><div class="slbl">Time</div></div>
    </div>
    <div class="dbox"><h3>📊 Performance by Domain</h3>${dBars}</div>
    <div class="arow">
      <button class="abtn homebtn" onclick="goHome()">🏠 Home</button>
      <button class="abtn retrybtn" onclick="retryTest()">🔄 Retry</button>
    </div>
    <div class="revbox"><h3>📋 Full Review with BABOK Explanations</h3>${rev}</div>
  </div>`;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (S.screen === 'home') app.innerHTML = renderHome();
  else if (S.screen === 'exam') app.innerHTML = renderExam();
  else app.innerHTML = renderResults();
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function switchTab(t) { S.tab = t; render(); }

function startExam(questions, mode, id) {
  clearInterval(S.interval);
  S.screen = 'exam';
  S.mode = mode;
  S.domainId = mode === 'domain' ? id : 0;
  S.realSet = mode === 'real' ? id : 0;
  S.questions = questions;
  S.qi = 0;
  S.ans = new Array(questions.length).fill(null);
  S.submitted = false;
  S.sec = 75 * 60; // 75 minutes
  S.start = Date.now();
  render();
  S.interval = setInterval(() => {
    S.sec--;
    if (S.sec <= 0) { clearInterval(S.interval); submitTest(); return; }
    const el = document.getElementById('timerEl');
    if (el) {
      const m = String(Math.floor(S.sec / 60)).padStart(2, '0');
      const s2 = String(S.sec % 60).padStart(2, '0');
      el.textContent = `${m}:${s2}`;
      if (S.sec < 300) el.classList.add('warn');
    }
  }, 1000);
}

function startDomain(did) {
  startExam(getQuestionsForDomain(did), 'domain', did);
}

function startReal(n) {
  startExam(getQuestionsForRealSet(n), 'real', n);
}

function pick(i) {
  if (S.submitted) return;
  S.ans[S.qi] = i;
  // Update option styles
  document.querySelectorAll('.opt').forEach((o, idx) => {
    const ol = o.querySelector('.oletter');
    o.className = 'opt' + (idx === i ? ' sel' : '');
    if (ol) { ol.style.background = idx === i ? '#1a4080' : ''; ol.style.color = idx === i ? '#fff' : ''; }
  });
  // Enable check button
  const chk = document.querySelector('.chkbtn');
  if (chk) chk.removeAttribute('disabled');
  // Show submit if ALL answered (FIX: check globally, not just current question)
  const allDone = S.ans.filter(a => a !== null && a !== undefined).length === S.questions.length;
  // Re-render nav row only
  const navrow = document.querySelector('.navrow');
  if (navrow && allDone && !S.submitted) {
    // Inject submit button if not already there
    if (!document.querySelector('.submbtn')) {
      const btn = document.createElement('button');
      btn.className = 'nbtn submbtn';
      btn.textContent = 'Submit All →';
      btn.onclick = submitTest;
      const mid = navrow.querySelector('div');
      if (mid) mid.appendChild(btn);
    }
  }
}

function checkQ() {
  if (S.ans[S.qi] === null || S.ans[S.qi] === undefined) return;
  const q = S.questions[S.qi];
  document.querySelectorAll('.opt').forEach((o, i) => {
    const ol = o.querySelector('.oletter');
    if (i === q.a) {
      o.classList.add('correct');
      if (ol) { ol.style.background = '#166534'; ol.style.color = '#fff'; }
    } else if (S.ans[S.qi] === i) {
      o.classList.add('wrong');
      if (ol) { ol.style.background = '#991b1b'; ol.style.color = '#fff'; }
    }
  });
  // Show explanation
  let exp = document.querySelector('.expbox');
  if (exp) { exp.style.display = 'block'; }
  else {
    const ok = S.ans[S.qi] === q.a;
    const div = document.createElement('div');
    div.className = `expbox ${ok ? '' : 'bad'}`;
    div.style.display = 'block';
    div.innerHTML = `<div class="exptitle">${ok ? '✅ Correct — ' : '❌ Incorrect — '}BABOK v3 Explanation</div>${q.e}`;
    document.querySelector('.opts').after(div);
  }
}

function submitTest() {
  clearInterval(S.interval);
  S.submitted = true;
  const qs = S.questions;
  let c = 0;
  qs.forEach((q, i) => { if (S.ans[i] === q.a) c++; });
  const key = scoreKey();
  S.scores[key] = { score: c, total: qs.length, p: Math.round((c / qs.length) * 100) };
  showResults();
}

function showResults() { S.screen = 'results'; render(); }
function goHome() { clearInterval(S.interval); S.screen = 'home'; render(); }
function retryTest() {
  if (S.mode === 'domain') startDomain(S.domainId);
  else startReal(S.realSet);
}
function prevQ() { if (S.qi > 0) { S.qi--; render(); } }
function nextQ() { if (S.qi < S.questions.length - 1) { S.qi++; render(); } }
function gotoQ(i) { S.qi = i; render(); }

render();
</script>
</body>
</html>
